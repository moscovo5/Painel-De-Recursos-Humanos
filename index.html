<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Recursos Humanos</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

:root{
--bg1:#f6f5f6;
--bg2:#f90;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:var(--bg1);
}

/* HEADER */

.header{
background:var(--bg2);
padding:10px;
position:relative;
}

.conjunto-header{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:#fff;
font-size:24px;
font-weight:bold;
}

.menu{
cursor:pointer;
}

.menu i{
font-size:1.7em;
color:#fff;
}

/* MENU ABAIXO DO HEADER */

.menu-dropdown{
position:absolute;
top:100%;
left:0;
width:100%;
background:#111;
max-height:0;
overflow:hidden;
transition:0.3s;
display:flex;
flex-direction:column;
}

.menu-dropdown a{
color:#fff;
padding:15px;
display:flex;
align-items:center;
gap:10px;
border-bottom:1px solid #333;
}

.menu-dropdown a:hover{
background:var(--bg2);
}

.menu-dropdown.ativo{
max-height:500px;
}

/* BARRA DE CONTROLO */

.conjud-header{
background:#fff;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
border-radius:6px;
}

/* LINKS */

.links-nav{
display:flex;
gap:10px;
}

.links-nav a{
background:#eee;
padding:8px 15px;
border-radius:5px;
color:#000;
}

.links-nav a:hover{
background:var(--bg2);
color:#fff;
}

/* SEARCH */

.search{
background:#333;
width:45px;
height:45px;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
transition:.3s;
}

.search.active{
width:250px;
}

.search input{
position:absolute;
left:0;
width:calc(100% - 45px);
height:100%;
border:none;
padding-left:10px;
background:transparent;
color:#fff;
display:none;
}

.search.active input{
display:block;
}

.search i{
color:#fff;
cursor:pointer;
}

/* RELOGIO */

.relogio{
background:var(--bg2);
color:#fff;
padding:5px 10px;
border-radius:5px;
}

/* MAIN */

main{
padding:30px;
min-height:70vh;
}

/* FOOTER */

footer{
background:var(--bg2);
color:#fff;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<div class="header">

<div class="conjunto-header">
<div class="logo">Recursos Humanos</div>

<div class="menu" id="menuBtn">
<i class="fa-solid fa-bars"></i>
</div>

</div>

<!-- MENU ABAIXO DO HEADER -->

<div class="menu-dropdown" id="menuDropdown">

<a href="#"><i class="fa-solid fa-home"></i> Dashboard</a>
<a href="#"><i class="fa-solid fa-user-plus"></i> Recrutamento</a>
<a href="#"><i class="fa-solid fa-id-badge"></i> Funcionários</a>
<a href="#"><i class="fa-solid fa-calendar-check"></i> Presenças</a>
<a href="#"><i class="fa-solid fa-money-bill"></i> Salários</a>
<a href="#"><i class="fa-solid fa-file"></i> Relatórios</a>
<a href="#"><i class="fa-solid fa-chart-line"></i> Desempenho</a>
<a href="#"><i class="fa-solid fa-user-shield"></i> Permissões</a>
<a href="#"><i class="fa-solid fa-gear"></i> Configurações</a>

</div>

<div class="conjud-header">

<div class="search" id="searchCampo">
<input type="text" placeholder="Buscar...">
<i class="fa-solid fa-magnifying-glass"></i>
</div>

<div class="links-nav">
<a href="#"><i class="fa-solid fa-home"></i> Inicio</a>
<a href="#"><i class="fa-solid fa-user"></i> Usuarios</a>
<a href="#"><i class="fa-solid fa-user-tie"></i> Trabalhadores</a>
<a href="#"><i class="fa-solid fa-users"></i> Contactos</a>
</div>

<div class="relogio" id="relogio">00:00:00</div>

</div>

</div>

<main>

<h2>Painel de Recursos Humanos</h2>
<p>Bem-vindo ao sistema de gestão de funcionários.</p>

</main>

<footer>
© Luanda <span id="ano"></span>
</footer>

<script>

/* MENU */

const menuBtn = document.getElementById("menuBtn");
const menuDropdown = document.getElementById("menuDropdown");

menuBtn.addEventListener("click",()=>{
menuDropdown.classList.toggle("ativo");
});

/* ANO AUTOMATICO */

document.getElementById("ano").textContent = new Date().getFullYear();

/* RELOGIO */

function atualizarRelogio(){

let agora = new Date();

let h = agora.getHours().toString().padStart(2,"0");
let m = agora.getMinutes().toString().padStart(2,"0");
let s = agora.getSeconds().toString().padStart(2,"0");

document.getElementById("relogio").textContent = `${h}:${m}:${s}`;

}

setInterval(atualizarRelogio,1000);
atualizarRelogio();

/* SEARCH */

const search = document.getElementById("searchCampo");

search.addEventListener("click",()=>{
search.classList.toggle("active");
});

</script>

</body>
</html>
