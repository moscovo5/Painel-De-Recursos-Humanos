<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Recursos Humanos || PG</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Poppins:wght@400;600&family=Roboto:wght@400;500&display=swap');

:root{
--bg1:#f6f5f6;
--bg2:#f90;
}

body{
background:var(--bg1);
margin:0;
font-family:poppins;
}

/* HEADER */

.header{
background:var(--bg2);
display:flex;
flex-direction:column;
padding:10px;
gap:10px;
}

.conjunto-header{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:#fff;
font-weight:bold;
font-size:24px;
}

.menu i{
color:#fff;
font-size:1.6em;
cursor:pointer;
}

.relogio{
background:#fff;
padding:5px 10px;
border-radius:4px;
}

/* MENU LATERAL */

.menu-lateral{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100vh;
background:#111;
display:flex;
flex-direction:column;
padding-top:70px;
transition:.3s;
z-index:1000;
}

.menu-lateral a{
color:#fff;
padding:15px 25px;
display:flex;
gap:10px;
align-items:center;
}

.menu-lateral a:hover{
background:var(--bg2);
}

.menu-lateral.ativo{
left:0;
}

/* NAV LINKS */

.links-nav{
display:flex;
gap:10px;
overflow:auto;
}

.links-nav a{
background:#eee;
padding:10px 15px;
border-radius:5px;
color:#000;
}

.links-nav a:hover{
background:var(--bg2);
color:#fff;
}

/* SEARCH */

.search{
background:#333;
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
position:relative;
transition:.3s;
}

.search.active{
width:250px;
}

.search input{
position:absolute;
left:0;
width:calc(100% - 45px);
height:100%;
border:none;
padding-left:10px;
background:transparent;
color:#fff;
display:none;
}

.search.active input{
display:block;
}

.search i{
color:#fff;
cursor:pointer;
}

/* MAIN */

main{
padding:30px;
min-height:70vh;
}

/* FOOTER */

footer{
background:var(--bg2);
color:#fff;
text-align:center;
padding:15px;
}

</style>
</head>

<body>

<!-- MENU LATERAL -->

<div class="menu-lateral" id="menuLateral">

<a href="#"><i class="fa-solid fa-home"></i> Dashboard</a>
<a href="#"><i class="fa-solid fa-user-plus"></i> Recrutamento</a>
<a href="#"><i class="fa-solid fa-id-badge"></i> Funcionários</a>
<a href="#"><i class="fa-solid fa-calendar-check"></i> Presenças</a>
<a href="#"><i class="fa-solid fa-money-bill"></i> Salários</a>
<a href="#"><i class="fa-solid fa-file"></i> Relatórios</a>
<a href="#"><i class="fa-solid fa-chart-line"></i> Desempenho</a>
<a href="#"><i class="fa-solid fa-user-shield"></i> Permissões</a>
<a href="#"><i class="fa-solid fa-gear"></i> Configurações</a>

</div>

<!-- HEADER -->

<div class="header">

<div class="conjunto-header">
<div class="logo">Recursos Humanos</div>
<div class="menu"><i class="fa-solid fa-bars"></i></div>
</div>

<div class="conjud-header">

<div class="search" id="searchCampo">
<input type="text" placeholder="Buscar...">
<i class="fa-solid fa-magnifying-glass"></i>
</div>

<div class="links-nav">
<a href="#"><i class="fa-solid fa-home"></i> Inicio</a>
<a href="#"><i class="fa-solid fa-user"></i> Usuarios</a>
<a href="#"><i class="fa-solid fa-user-tie"></i> Trabalhadores</a>
<a href="#"><i class="fa-solid fa-users"></i> Contactos</a>
</div>

<div class="relogio" id="relogio">00:00:00</div>

</div>

</div>

<main>

<h2>Painel de Recursos Humanos</h2>
<p>Bem-vindo ao sistema de gestão de funcionários.</p>

</main>

<footer>
&copy; Luanda <span id="ano"></span>
</footer>

<script>

/* MENU */

const menuBtn = document.querySelector(".menu");
const menuLateral = document.getElementById("menuLateral");

menuBtn.addEventListener("click",(e)=>{
e.stopPropagation();
menuLateral.classList.toggle("ativo");
});

document.addEventListener("click",()=>{
menuLateral.classList.remove("ativo");
});

menuLateral.addEventListener("click",(e)=>{
e.stopPropagation();
});

/* ANO AUTOMATICO */

document.getElementById("ano").textContent = new Date().getFullYear();

/* RELOGIO */

function atualizarRelogio(){

let agora = new Date();

let h = agora.getHours().toString().padStart(2,"0");
let m = agora.getMinutes().toString().padStart(2,"0");
let s = agora.getSeconds().toString().padStart(2,"0");

document.getElementById("relogio").textContent = `${h}:${m}:${s}`;

}

setInterval(atualizarRelogio,1000);
atualizarRelogio();

/* SEARCH */

const search = document.getElementById("searchCampo");

search.addEventListener("click",()=>{
search.classList.toggle("active");
});

</script>

</body>
</html>
