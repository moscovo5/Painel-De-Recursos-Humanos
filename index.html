<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Recursos Humanos</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== FONTES ===== */

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Poppins:wght@400;600&family=Roboto:wght@400;500&display=swap');

/* ===== VARIÁVEIS ===== */

:root{
--bg1:#f6f5f6;
--bg2:#ff9900;
}

/* ===== RESET ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
text-decoration: none;
font-family:"Poppins",sans-serif;
}

body{
background:var(--bg1);
}

/* ===== HEADER ===== */

.header{
background:var(--bg2);
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
position:relative;
}

/* topo */

.header-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:#fff;
font-size:24px;
font-weight:bold;
}

.menu{
cursor:pointer;
font-size:1.6em;
color:#fff;
}

/* ===== MENU DROPDOWN ===== */

.menu-dropdown{
position:absolute;
left:0;
top:100%;
width:100%;
background:#111;

display:flex;
flex-direction:column;

transform:translateY(-20px);
opacity:0;
pointer-events:none;

transition:0.35s ease;
}

.menu-dropdown a{
color:#fff;
padding:15px;
display:flex;
align-items:center;
gap:10px;
border-bottom:1px solid #333;
transition:0.2s;
}

.menu-dropdown a:hover{
background:var(--bg2);
}

.menu-dropdown.active{
transform:translateY(0);
opacity:1;
pointer-events:auto;
}

/* ===== BARRA CONTROLO ===== */

.control-bar{
background:#fff;
padding:10px;
display:flex;
align-items:center;
justify-content:space-between;
border-radius:6px;
}

/* ===== LINKS ===== */

.links{
display:flex;
gap:10px;
overflow:auto;
}

.links a{
background:#eee;
padding:8px 15px;
border-radius:5px;
overflow: hidden;
transition: .4s;
color:#000;z-index: 1;
position: relative;
}
.links a::before{
    content: "";
    position: absolute;
    top: 0;
background:var(--bg2);
width: 0;
height: 100%;
transition: .3s;
left: 0;z-index: -1;
}.links a:hover::before{
    width: 100%;
}

.links a:hover{
color:#fff;
}

/* ===== SEARCH ===== */

.search{
background:#333;
width:45px;
height:45px;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
transition:0.3s;
}

.search.active{
width:250px;
}

.search input{
position:absolute;
left:0;
width:calc(100% - 45px);
height:100%;
border:none;
background:transparent;
padding-left:10px;
color:#fff;
display:none;
}

.search.active input{
display:block;
}

.search i{
color:#fff;
cursor:pointer;
}

/* ===== RELÓGIO ===== */

.clock{
background:var(--bg2);
color:#fff;
padding:5px 10px;
border-radius:5px;
}

/* ===== MAIN ===== */

main{
padding:30px;
min-height:70vh;
}

/* ===== FOOTER ===== */

footer{
background:var(--bg2);
color:#fff;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header class="header">

<div class="header-top">

<div class="logo">Recursos Humanos</div>

<div class="menu" id="menuBtn">
<i class="fa-solid fa-bars"></i>
</div>

</div>

<!-- MENU -->

<nav class="menu-dropdown" id="menuDropdown">

<a href="#"><i class="fa-solid fa-home"></i> Dashboard</a>
<a href="#"><i class="fa-solid fa-user-plus"></i> Recrutamento</a>
<a href="#"><i class="fa-solid fa-id-badge"></i> Funcionários</a>
<a href="#"><i class="fa-solid fa-calendar-check"></i> Presenças</a>
<a href="#"><i class="fa-solid fa-money-bill"></i> Salários</a>
<a href="#"><i class="fa-solid fa-file"></i> Relatórios</a>
<a href="#"><i class="fa-solid fa-chart-line"></i> Desempenho</a>
<a href="#"><i class="fa-solid fa-user-shield"></i> Permissões</a>
<a href="#"><i class="fa-solid fa-gear"></i> Configurações</a>

</nav>

<!-- CONTROL BAR -->

<div class="control-bar">

<div class="search" id="search">

<input type="text" placeholder="Buscar...">

<i class="fa-solid fa-magnifying-glass"></i>

</div>

<div class="links">

<a href="#"><i class="fa-solid fa-home"></i> Inicio</a>
<a href="#"><i class="fa-solid fa-user"></i> Usuarios</a>
<a href="#"><i class="fa-solid fa-user-tie"></i> Trabalhadores</a>
<a href="#"><i class="fa-solid fa-users"></i> Contactos</a>

</div>

<div class="clock" id="clock">
00:00:00
</div>

</div>

</header>

<main>

<h2>Painel Recursos Humanos</h2>
<p>Bem-vindo ao sistema de gestão de funcionários.</p>

</main>

<footer>

© Luanda <span id="year"></span>

</footer>

<script>

/* MENU */

const menuBtn = document.getElementById("menuBtn");
const menuDropdown = document.getElementById("menuDropdown");

/* abrir / fechar menu */

menuBtn.addEventListener("click",(e)=>{
e.stopPropagation();
menuDropdown.classList.toggle("active");
});

/* fechar ao clicar fora */

document.addEventListener("click",(e)=>{

if(!menuDropdown.contains(e.target) && !menuBtn.contains(e.target)){
menuDropdown.classList.remove("active");
}

});

/* fechar ao clicar nos links */

const linksMenu = menuDropdown.querySelectorAll("a");

linksMenu.forEach(link => {

link.addEventListener("click",()=>{
menuDropdown.classList.remove("active");
});

});

/* SEARCH */

const search = document.getElementById("search");

search.addEventListener("click",()=>{
search.classList.toggle("active");
});

/* RELÓGIO */

function updateClock(){

let now = new Date();

let h = now.getHours().toString().padStart(2,"0");
let m = now.getMinutes().toString().padStart(2,"0");
let s = now.getSeconds().toString().padStart(2,"0");

document.getElementById("clock").textContent = `${h}:${m}:${s}`;

}

setInterval(updateClock,1000);
updateClock();

/* ANO */

document.getElementById("year").textContent =
new Date().getFullYear();

</script>

</body>
</html>
